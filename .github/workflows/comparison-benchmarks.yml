name: ComparisonBenchmarks

on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Regexp filter for benchmarks to run (passed to --filter)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: Benchmarks/Comparison

jobs:
  benchmark:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # The package needs Swift 6.4, which no released Xcode ships yet; install
      # the latest main development snapshot toolchain from swift.org.
      - name: Install Swift development snapshot
        working-directory: ${{ runner.temp }}
        run: |
          json=$(curl -sS https://www.swift.org/api/v1/install/dev/main/macos.json)
          dir=$(echo "$json" | jq -r '.universal[0].dir')
          pkg=$(echo "$json" | jq -r '.universal[0].download')
          echo "Installing $dir"
          curl -sSLO "https://download.swift.org/development/xcode/$dir/$pkg"
          sudo installer -pkg "$pkg" -target /
          id=$(plutil -extract CFBundleIdentifier raw "/Library/Developer/Toolchains/$dir.xctoolchain/Info.plist")
          echo "TOOLCHAINS=$id" >> "$GITHUB_ENV"

      - name: Show Swift version
        run: swift --version

      - name: Install jemalloc
        run: brew install jemalloc

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            Benchmarks/Comparison/.build
            ~/Library/Caches/org.swift.swiftpm
          key: comparison-benchmarks-${{ runner.os }}-${{ hashFiles('Package.swift', 'Benchmarks/Comparison/Package.swift') }}
          restore-keys: |
            comparison-benchmarks-${{ runner.os }}-

      - name: Run benchmarks
        env:
          FILTER: ${{ inputs.filter }}
        run: |
          args=()
          if [ -n "$FILTER" ]; then
            args+=(--filter "$FILTER")
          fi
          swift package --allow-writing-to-package-directory benchmark \
            baseline update ci --no-progress "${args[@]}"

      - name: Publish results to job summary
        run: |
          swift package --allow-writing-to-package-directory benchmark \
            baseline read ci --format markdown --no-progress \
            | awk '/^## /{found=1} found' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload baseline
        uses: actions/upload-artifact@v4
        with:
          name: comparison-benchmarks-baseline
          path: Benchmarks/Comparison/.benchmarkBaselines/
          include-hidden-files: true
